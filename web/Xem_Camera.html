<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hệ thống Camera Trực Tiếp (WebRTC)</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #0f172a;
            color: #f8fafc;
            margin: 0;
            padding: 30px;
        }
        h1 {
            text-align: center;
            margin-bottom: 30px;
            color: #38bdf8;
            font-weight: 600;
        }
        .grid-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(450px, 1fr));
            gap: 25px;
            max-width: 1600px;
            margin: 0 auto;
        }
        .camera-card {
            background: #1e293b;
            border-radius: 12px;
            padding: 15px;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.5);
            transition: transform 0.2s;
        }
        .camera-card:hover {
            transform: translateY(-5px);
        }
        .camera-title {
            margin: 0 0 15px 0;
            text-align: center;
            font-size: 1.2rem;
            color: #e2e8f0;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }
        .status-dot {
            width: 10px;
            height: 10px;
            background-color: #22c55e;
            border-radius: 50%;
            display: inline-block;
            box-shadow: 0 0 10px #22c55e;
        }
        iframe {
            width: 100%;
            aspect-ratio: 16/9;
            border: none;
            border-radius: 8px;
            background-color: #000;
        }
        .footer {
            text-align: center;
            margin-top: 50px;
            color: #64748b;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>

    <h1>Hệ thống Camera Trực Tiếp (Độ trễ 0s)</h1>

    <div class="grid-container">
        <!-- Camera 1 -->
        <div class="camera-card">
            <h3 class="camera-title"><span class="status-dot"></span> Camera 1 (Cổng Trái)</h3>
            <iframe src="http://192.168.100.91:8889/cam1/" allow="autoplay; fullscreen; picture-in-picture"></iframe>
        </div>

        <!-- Camera 2 -->
        <div class="camera-card">
            <h3 class="camera-title"><span class="status-dot"></span> Camera 2 (Sảnh Chính)</h3>
            <iframe src="http://192.168.100.91:8889/cam2/" allow="autoplay; fullscreen; picture-in-picture"></iframe>
        </div>

        <!-- Camera 3 -->
        <div class="camera-card">
            <h3 class="camera-title"><span class="status-dot"></span> Camera 3 (Hành Lang)</h3>
            <iframe src="http://192.168.100.91:8889/cam3/" allow="autoplay; fullscreen; picture-in-picture"></iframe>
        </div>
    </div>

    <div class="footer">
        Powered by MediaMTX WebRTC • Cực kỳ ổn định cho 100 người xem
    </div>

</body>
</html>
